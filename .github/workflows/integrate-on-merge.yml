name: Integrate Garden Entry on Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  integrate:
    if: >
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'garden-submission')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout garden
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout soredium
        uses: actions/checkout@v4
        with:
          repository: Hortora/soredium
          path: .soredium

      - name: Install dependencies
        run: pip install pyyaml

      - name: Detect merged entry files
        id: entry
        run: |
          # Match both legacy (GE-0001.md) and new-format (GE-20260412-a3f7c2.md) IDs
          FILES=$(git show --name-only --pretty="" HEAD | grep -E '^[^/]+/GE-[0-9a-f-]+\.md$')
          if [ -z "$FILES" ]; then
            echo "No garden entry file in this merge"
            echo "files=" >> $GITHUB_OUTPUT
          else
            # Newline-separated list → space-separated for output
            FILES_ONELINE=$(echo "$FILES" | tr '\n' ' ' | sed 's/ $//')
            echo "files=$FILES_ONELINE" >> $GITHUB_OUTPUT
          fi

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Integrate entries
        if: steps.entry.outputs.files != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for FILE in ${{ steps.entry.outputs.files }}; do
            echo "Integrating: $FILE"
            python .soredium/scripts/integrate_entry.py "$FILE" .
          done

      - name: Push index updates
        if: steps.entry.outputs.files != ''
        run: git push origin main
